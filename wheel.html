<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kira - wheel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: '1';
            src: url('1.ttf') format('truetype');
        }

        @font-face {
            font-family: '2';
            src: url('2.ttf') format('truetype');
        }

        body {
            background-color: black;
        }

        h1 {
            color: white;
            font-family: '1', sans-serif;
            text-align: center;
            background-color: rgb(20, 20, 20);
            height: 100px;
            line-height: 100px;
            font-size: 50px;
        }

        canvas {
            display: block;
            margin: 40px auto 0;
        }

        button {
            background-color: #2c2c2c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 24px;
            cursor: pointer;
            display: block;
            margin: 20px auto 0;
            height: 60px;
            width: 200px;
            font-family: '2', sans-serif;
        }

        button:hover {
            background-color: #141414;
        }

        #result {
            color: white;
            font-family: '2', sans-serif;
            text-align: center;
            font-size: 30px;
            margin-top: 20px;
        }

        #code-input {
            background-color: #2c2c2c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 20px;
            padding: 8px 16px;
            font-family: '2', sans-serif;
            text-align: center;
            width: 200px;
        }

        #code-input:focus {
            outline: none;
            background-color: #3a3a3a;
        }

        #code-result {
            color: white;
            font-family: '2', sans-serif;
            font-size: 18px;
            margin-top: 10px;
        }

        #names-section {
            margin: 40px auto;
            width: 400px;
        }

        #names-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }

        .name-row {
            display: flex;
            gap: 10px;
        }

        .name-input {
            background-color: #2c2c2c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 20px;
            padding: 8px 16px;
            font-family: '2', sans-serif;
            flex: 1;
        }

        .name-input:focus {
            outline: none;
            background-color: #3a3a3a;
        }

        .remove-btn {
            background-color: #2c2c2c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .remove-btn:hover {
            background-color: #141414;
        }

        #add-btn {
            width: 400px;
            font-size: 20px;
            height: 44px;
        }
    </style>
</head>
<body>
    <a href="index.html" style="text-decoration: none; color: inherit;">
        <h1>k i r a</h1>
    </a>

    <div style="position: relative; width: 400px; margin: 40px auto 0;">
        <canvas id="wheel" width="400" height="400"></canvas>
        <div style="
            position: absolute;
            right: -18px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 14px solid transparent;
            border-bottom: 14px solid transparent;
            border-right: 28px solid white;
        "></div>
    </div>

    <button onclick="spin()">spin</button>
    <p id="result"></p>

    <div id="code-section" style="text-align: center; margin-top: 20px;">
        <input id="code-input" type="text" placeholder="enter code">
        <p id="code-result"></p>
    </div>

    <div id="names-section">
        <div id="names-list"></div>
        <button id="add-btn" onclick="addName()">+ add name</button>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');

        let names = ['alice', 'bob', 'charlie', 'dave'];
        let rotation = 0;
        let spinning = false;

        const cookieImg = new Image();
        cookieImg.src = 'cdn/cookie.jpg';
        cookieImg.onload = () => drawWheel();

        const codes = {
            'overstreet': [
                'anderdoo', 'ramen', 'joy', 'jessica', 'reese',
                'mya', 'anabelle', 'jordyn', 'brayden', 'brantley',
                'emily', 'alivia', 'christopher', 'wyatt', 'samanthar',
                'paisley', 'ben', 'isaac', 'beckham', 'damian'
            ]
        };

        function drawWheel() {
            const numSlices = names.length;
            const sliceAngle = (2 * Math.PI) / numSlices;
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const r = 190;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            names.forEach((name, i) => {
                const start = rotation + i * sliceAngle;
                const end = start + sliceAngle;

                ctx.save();
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, r, start, end);
                ctx.closePath();
                ctx.clip();

                if (cookieImg.complete && cookieImg.naturalWidth > 0) {
                    ctx.translate(cx, cy);
                    ctx.rotate(rotation);
                    ctx.drawImage(cookieImg, -r, -r, r * 2, r * 2);
                    ctx.rotate(-rotation);
                    ctx.translate(-cx, -cy);
                } else {
                    ctx.fillStyle = '#2c2c2c';
                    ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
                }

                ctx.restore();

                // dividing lines only
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                const lx = cx + r * Math.cos(start);
                const ly = cy + r * Math.sin(start);
                ctx.lineTo(lx, ly);
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // text
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(start + sliceAngle / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = 'white';
                ctx.shadowColor = 'black';
                ctx.shadowBlur = 6;
                ctx.font = 'bold 18px sans-serif';
                ctx.fillText(name, r - 10, 5);
                ctx.restore();
            });

            // center circle
            ctx.beginPath();
            ctx.arc(cx, cy, 15, 0, 2 * Math.PI);
            ctx.fillStyle = 'black';
            ctx.fill();
        }

        function spin() {
            if (spinning) return;
            spinning = true;
            document.getElementById('result').textContent = '';

            let speed = Math.random() * 0.2 + 0.2;
            const deceleration = 0.995;

            function animate() {
                rotation += speed;
                speed *= deceleration;
                drawWheel();

                if (speed > 0.001) {
                    requestAnimationFrame(animate);
                } else {
                    spinning = false;
                    getWinner();
                }
            }

            animate();
        }

        function getWinner() {
            const numSlices = names.length;
            const sliceAngle = (2 * Math.PI) / numSlices;
            const normalized = ((0 - rotation) % (2 * Math.PI) + (2 * Math.PI)) % (2 * Math.PI);
            const index = Math.floor(normalized / sliceAngle) % numSlices;
            document.getElementById('result').textContent = '→ ' + names[index];
        }

        function updateNames() {
            names = Array.from(document.querySelectorAll('.name-input'))
                .map(i => i.value.trim())
                .filter(n => n !== '');
            drawWheel();
        }

        function addName() {
            const list = document.getElementById('names-list');
            const row = document.createElement('div');
            row.className = 'name-row';
            row.innerHTML = `
                <input class="name-input" type="text" placeholder="name" oninput="updateNames()">
                <button class="remove-btn" onclick="removeName(this)">✕</button>
            `;
            list.appendChild(row);
            updateNames();
        }

        function removeName(btn) {
            btn.parentElement.remove();
            updateNames();
        }

        document.getElementById('code-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const val = this.value.trim().toLowerCase();
                if (codes[val]) {
                    document.getElementById('names-list').innerHTML = '';
                    names = [];
                    codes[val].forEach(name => {
                        const list = document.getElementById('names-list');
                        const row = document.createElement('div');
                        row.className = 'name-row';
                        row.innerHTML = `
                            <input class="name-input" type="text" value="${name}" oninput="updateNames()">
                            <button class="remove-btn" onclick="removeName(this)">✕</button>
                        `;
                        list.appendChild(row);
                    });
                    updateNames();
                    document.getElementById('code-result').textContent = '✓ code accepted';
                    this.value = '';
                } else {
                    document.getElementById('code-result').textContent = '✗ invalid code';
                }
            }
        });

        // init with default names
        names.forEach(name => {
            const list = document.getElementById('names-list');
            const row = document.createElement('div');
            row.className = 'name-row';
            row.innerHTML = `
                <input class="name-input" type="text" value="${name}" oninput="updateNames()">
                <button class="remove-btn" onclick="removeName(this)">✕</button>
            `;
            list.appendChild(row);
        });

        drawWheel();
    </script>
</body>
</html>
